<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<title>越境コーチ — Embedded Exam Coach</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<!-- Fonts load from Google when online; fall back gracefully if blocked -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ===== Tokens ===== */
:root {
  --bg: oklch(0.985 0.003 85);
  --bg-elev: oklch(0.995 0.002 85);
  --surface: #ffffff;
  --surface-2: oklch(0.975 0.004 85);
  --border: oklch(0.91 0.005 85);
  --border-strong: oklch(0.84 0.006 85);
  --ink: oklch(0.21 0.008 80);
  --ink-2: oklch(0.34 0.008 80);
  --muted: oklch(0.52 0.008 80);
  --faint: oklch(0.68 0.008 80);

  --accent: oklch(0.55 0.10 200);
  --accent-ink: oklch(0.36 0.10 200);
  --accent-soft: oklch(0.95 0.022 200);
  --accent-border: oklch(0.86 0.045 200);

  --ok: oklch(0.6 0.11 150);
  --ok-soft: oklch(0.95 0.025 150);
  --warn: oklch(0.7 0.13 75);
  --warn-soft: oklch(0.96 0.04 80);
  --danger: oklch(0.58 0.16 25);
  --danger-soft: oklch(0.96 0.025 25);

  --r-xs: 4px;
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 20px;

  --shadow-1: 0 1px 0 rgba(20, 20, 20, 0.03), 0 1px 2px rgba(20, 20, 20, 0.04);
  --shadow-2: 0 4px 14px rgba(20, 20, 20, 0.06), 0 1px 2px rgba(20, 20, 20, 0.04);

  --sans: "Noto Sans JP", "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --mono: "JetBrains Mono", "SFMono-Regular", ui-monospace, Menlo, monospace;
  --serif: "Noto Serif JP", Georgia, "Times New Roman", serif;
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "palt" 1;
}

#root {
  min-height: 100vh;
}

button {
  font-family: inherit;
  cursor: pointer;
}

/* numbers + japanese friendly */
.num {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
}

.label {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

/* ===== Layout ===== */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: var(--bg-elev);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 22px 14px;
  position: sticky;
  top: 0;
  height: 100vh;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 8px 18px;
}

.brand-mark {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  background: var(--ink);
  color: var(--bg);
  display: grid;
  place-items: center;
  font-family: var(--serif);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.02em;
}

.brand-name {
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.02em;
}

.brand-sub {
  font-size: 10.5px;
  color: var(--muted);
  letter-spacing: 0.06em;
}

.nav-section {
  margin-top: 14px;
}

.nav-section h6 {
  margin: 0 8px 6px;
  font-size: 10px;
  color: var(--faint);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 600;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 9px;
  border-radius: var(--r-sm);
  color: var(--ink-2);
  font-size: 13px;
  cursor: pointer;
  margin: 1px 0;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  transition: background 0.12s ease;
}

.nav-item:hover {
  background: var(--surface-2);
}

.nav-item.active {
  background: var(--ink);
  color: var(--bg);
}

.nav-item.active .nav-tag {
  background: rgba(255,255,255,0.18);
  color: var(--bg);
}

.nav-tag {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10.5px;
  padding: 1px 6px;
  background: var(--surface-2);
  border-radius: 999px;
  color: var(--muted);
}

.nav-glyph {
  width: 18px;
  display: grid;
  place-items: center;
  color: currentColor;
  opacity: 0.85;
}

.sidebar-foot {
  margin-top: auto;
  padding: 12px 8px 0;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
}

.avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-soft), var(--surface-2));
  border: 1px solid var(--border);
  display: grid;
  place-items: center;
  color: var(--accent-ink);
  font-weight: 700;
  font-size: 12px;
}

/* ===== Main ===== */
.main {
  padding: 28px 40px 80px;
  max-width: 1280px;
  width: 100%;
}

.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 24px;
}

.page-head-main {
  min-width: 0;
  flex: 1;
}

.page-head-right {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}

.page-head h1 {
  margin: 0 0 4px;
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.2;
}

.page-head .crumb {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}

.page-head .sub {
  font-size: 13px;
  color: var(--muted);
  max-width: 60ch;
}

/* ===== Cards ===== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 18px;
}

.card.tight {
  padding: 14px;
}

.card.flat {
  background: var(--surface-2);
  border-color: transparent;
}

.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  gap: 10px;
}

.card-head h3 {
  margin: 0;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.01em;
  color: var(--ink);
}

.card-head .sub {
  font-size: 11.5px;
  color: var(--muted);
}

/* Grid helpers */
.row {
  display: flex;
  gap: 16px;
}

.col {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.grid-2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

/* ===== Badges / chips ===== */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 20px;
  padding: 0 8px;
  border-radius: 999px;
  font-size: 11px;
  background: var(--surface-2);
  color: var(--ink-2);
  border: 1px solid var(--border);
  letter-spacing: 0.02em;
}

.chip.accent {
  background: var(--accent-soft);
  border-color: var(--accent-border);
  color: var(--accent-ink);
}
.chip.ok { background: var(--ok-soft); border-color: oklch(0.85 0.05 150); color: oklch(0.4 0.1 150); }
.chip.warn { background: var(--warn-soft); border-color: oklch(0.86 0.06 80); color: oklch(0.42 0.11 70); }
.chip.danger { background: var(--danger-soft); border-color: oklch(0.84 0.07 25); color: oklch(0.4 0.14 25); }

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--muted);
  display: inline-block;
}
.dot.accent { background: var(--accent); }
.dot.ok { background: var(--ok); }
.dot.warn { background: var(--warn); }
.dot.danger { background: var(--danger); }

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  height: 32px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border-strong);
  background: var(--surface);
  font-size: 13px;
  color: var(--ink);
  font-weight: 500;
  transition: background 0.12s ease, border-color 0.12s ease;
}

.btn:hover {
  background: var(--surface-2);
}

.btn.primary {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.btn.primary:hover {
  background: oklch(0.28 0.01 80);
}

.btn.accent {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.btn.ghost {
  border-color: transparent;
  background: transparent;
}

.btn.sm {
  height: 26px;
  padding: 0 9px;
  font-size: 12px;
}

/* ===== Progress ===== */
.bar {
  height: 6px;
  border-radius: 999px;
  background: var(--surface-2);
  overflow: hidden;
}
.bar > div {
  height: 100%;
  background: var(--ink);
  border-radius: inherit;
}

.kpi {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.kpi .val {
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1;
}
.kpi .val .unit {
  font-size: 13px;
  color: var(--muted);
  margin-left: 3px;
  font-weight: 400;
}
.kpi .label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.04em;
}
.kpi .delta {
  font-size: 11px;
  color: var(--ok);
  font-family: var(--mono);
}
.kpi .delta.down { color: var(--danger); }
.kpi .delta.flat { color: var(--muted); }

/* ===== Task list ===== */
.task {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-top: 1px solid var(--border);
  align-items: flex-start;
}
.task:first-child {
  border-top: none;
}
.check {
  width: 18px;
  height: 18px;
  border-radius: 5px;
  border: 1.5px solid var(--border-strong);
  display: grid;
  place-items: center;
  flex-shrink: 0;
  cursor: pointer;
  background: var(--surface);
  margin-top: 2px;
}
.check.done {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--bg);
}
.check.done svg { display: block; }
.check svg { display: none; }

.task .body { flex: 1; min-width: 0; }
.task .title {
  font-size: 13.5px;
  color: var(--ink);
  font-weight: 500;
}
.task .meta {
  font-size: 11.5px;
  color: var(--muted);
  margin-top: 2px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.task.done .title { color: var(--muted); text-decoration: line-through; }

.subj-tag {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.04em;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--surface-2);
  color: var(--ink-2);
  border: 1px solid var(--border);
}
.subj-tag.a2 { background: oklch(0.97 0.018 250); border-color: oklch(0.88 0.04 250); color: oklch(0.4 0.1 250); }
.subj-tag.b1 { background: oklch(0.96 0.025 130); border-color: oklch(0.85 0.06 130); color: oklch(0.38 0.1 130); }
.subj-tag.b2 { background: oklch(0.96 0.03 50); border-color: oklch(0.85 0.07 50); color: oklch(0.42 0.13 50); }

/* ===== Coach chat ===== */
.coach {
  background: linear-gradient(180deg, var(--accent-soft) 0%, var(--surface) 60%);
  border: 1px solid var(--accent-border);
  border-radius: var(--r-lg);
  padding: 18px 18px 16px;
}
.coach-head {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 10px;
}
.coach-mark {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  display: grid;
  place-items: center;
  font-weight: 700;
  font-size: 12px;
  font-family: var(--serif);
}
.coach-name {
  font-weight: 600;
  font-size: 13px;
}
.coach-meta {
  font-size: 11px;
  color: var(--muted);
}
.coach-msg {
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--ink);
}
.coach-msg em { font-style: normal; background: oklch(0.97 0.04 80); padding: 0 4px; border-radius: 3px; }
.coach-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}

/* ===== Table-like ===== */
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
.tbl th, .tbl td {
  text-align: left;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
}
.tbl th {
  font-weight: 500;
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.tbl td.num { font-family: var(--mono); }

/* ===== Card schedule grid (A-2) ===== */
.cardgrid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.daycell {
  background: var(--surface-2);
  border-radius: var(--r-sm);
  padding: 8px 9px;
  min-height: 78px;
  border: 1px solid transparent;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.daycell.today {
  background: var(--surface);
  border-color: var(--ink);
}
.daycell.sunday {
  background: oklch(0.97 0.005 80);
}
.daycell.future {
  opacity: 0.55;
}
.daycell-date {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
}
.daycell-date .dow { color: var(--faint); }
.daycell.sunday .dow { color: var(--warn); }

.minicard {
  font-family: var(--mono);
  font-size: 10px;
  padding: 1px 4px;
  border-radius: 3px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--ink-2);
  display: inline-block;
}
.minicard.new {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
  font-weight: 600;
}
.minicard.rev-1 { background: oklch(0.93 0.04 200); color: oklch(0.32 0.1 200); border-color: oklch(0.82 0.06 200); }
.minicard.rev-2 { background: oklch(0.93 0.05 200); }
.minicard.rev-3 { background: oklch(0.91 0.06 200); }

/* ===== Pomodoro / timer ===== */
.timer-ring {
  position: relative;
  width: 200px;
  height: 200px;
  margin: 0 auto;
}
.timer-time {
  font-family: var(--mono);
  font-size: 38px;
  font-weight: 600;
  letter-spacing: -0.02em;
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  flex-direction: column;
}
.timer-time small {
  display: block;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 6px;
  font-weight: 400;
}

/* ===== Heatmap (B-2 progress) ===== */
.heat {
  display: grid;
  gap: 3px;
}
.heat-cell {
  width: 100%;
  aspect-ratio: 1;
  background: var(--surface-2);
  border-radius: 3px;
  border: 1px solid var(--border);
}
.heat-cell.l1 { background: oklch(0.93 0.03 200); border-color: oklch(0.85 0.04 200); }
.heat-cell.l2 { background: oklch(0.86 0.06 200); border-color: oklch(0.78 0.08 200); }
.heat-cell.l3 { background: oklch(0.74 0.1 200); border-color: oklch(0.68 0.11 200); }
.heat-cell.l4 { background: oklch(0.55 0.11 200); border-color: oklch(0.5 0.11 200); }
.heat-cell.done { background: var(--ink); border-color: var(--ink); }

/* ===== Misc ===== */
.divider {
  height: 1px;
  background: var(--border);
  margin: 14px 0;
}

.muted { color: var(--muted); }
.faint { color: var(--faint); }

.scroll-area {
  max-height: 420px;
  overflow-y: auto;
}

.section-title {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 0 0 10px;
  font-weight: 600;
}

/* timeline */
.timeline {
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
}
.timeline::before {
  content: "";
  position: absolute;
  left: 12px;
  top: 6px;
  bottom: 6px;
  width: 1px;
  background: var(--border);
}
.tl-item {
  display: flex;
  gap: 14px;
  padding: 10px 0;
  position: relative;
}
.tl-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--surface);
  border: 2px solid var(--border-strong);
  margin-left: 8px;
  margin-top: 6px;
  flex-shrink: 0;
  z-index: 1;
}
.tl-dot.now {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-soft);
}
.tl-dot.done {
  background: var(--ink);
  border-color: var(--ink);
}

/* segmented */
.seg {
  display: inline-flex;
  background: var(--surface-2);
  border-radius: var(--r-sm);
  padding: 2px;
  border: 1px solid var(--border);
}
.seg button {
  border: none;
  background: transparent;
  padding: 4px 10px;
  font-size: 12px;
  color: var(--muted);
  border-radius: 4px;
  cursor: pointer;
}
.seg button.on {
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow-1);
}

.linkish {
  color: var(--accent-ink);
  text-decoration: none;
  border-bottom: 1px dotted var(--accent-border);
  cursor: pointer;
}

/* ===== Stat row (4-col stat group with separators) ===== */
.stat-row {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  align-items: center;
}
.stat-row .stat-cell + .stat-cell {
  border-left: 1px solid var(--border);
  padding-left: 18px;
}
.stat-cell { min-width: 0; }

/* ===== B2 themes row ===== */
.b2-row {
  display: grid;
  grid-template-columns: minmax(140px, 200px) 1fr 280px;
  gap: 14px;
  align-items: center;
}
.b2-dots {
  display: flex;
  gap: 3px;
  align-items: center;
}

/* ===== Card schedule year matrix ===== */
.ymatrix-scroll { width: 100%; }
.ymatrix-inner { min-width: 0; }

/* ===== Card-head with wrappable nav ===== */
.card-head.card-head-wrap {
  flex-wrap: wrap;
  row-gap: 10px;
}

/* phase strip */
.phase-strip {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 4px;
  margin-top: 8px;
}
.phase-cell {
  background: var(--surface-2);
  border-radius: 4px;
  padding: 8px 6px;
  font-size: 10.5px;
  text-align: center;
  color: var(--muted);
  border: 1px solid transparent;
  position: relative;
}
.phase-cell.done {
  background: oklch(0.94 0.02 80);
  color: var(--ink-2);
}
.phase-cell.now {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.phase-cell .month {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  display: block;
  opacity: 0.7;
}

/* Star rating-like cell for review */
.review-grid {
  display: grid;
  grid-template-columns: 140px repeat(4, 1fr) 60px;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  overflow: hidden;
}
.review-grid > div {
  background: var(--surface);
  padding: 9px 10px;
  font-size: 12px;
}
.review-grid > div.head {
  background: var(--surface-2);
  font-size: 10.5px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
}

/* Tweak: density */

  // useState-style call doesn't write a "[object Object]" key into the persisted

  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null

    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));

    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>

}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ----- 科目A-2 card schedule -----
// 通し番号 → 年度・問
function cardToProblem(c) {
  const year = 2010 + Math.floor((c - 1) / 25);
  const q = ((c - 1) % 25) + 1;
  return { year, q };
}

// Card c introduction day (1-indexed):  D(c) = 7*floor((c-1)/6) + ((c-1)%6) + 1
function introDay(c) {
  return 7 * Math.floor((c - 1) / 6) + ((c - 1) % 6) + 1;
}

// Card c appears on days: D, D+1, D+3, D+7, D+15, D+31, D+63, ...
function appearancesForCard(c) {
  const D = introDay(c);
  const out = [];
  for (let k = 0; k < 8; k++) {
    out.push({ day: D + (Math.pow(2, k) - 1), rep: k });
  }
  return out;
}

// On a given day (1-indexed), what cards appear?
function cardsOnDay(day) {
  // try cards c such that some appearance == day
  const result = [];
  // intro day <= day
  const maxC = Math.min(6 * Math.ceil(day / 7), 25 * 16); // safe upper bound
  for (let c = 1; c <= maxC; c++) {
    const D = introDay(c);
    if (D > day) continue;
    const diff = day - D;
    // diff must be (2^k - 1)
    for (let k = 0; k < 12; k++) {
      const expected = Math.pow(2, k) - 1;
      if (expected === diff) {
        result.push({ c, rep: k, intro: k === 0 });
        break;
      }
      if (expected > diff) break;
    }
  }
  // sort: intro last (rule §5.1③), 古い順 first
  result.sort((a, b) => {
    if (a.intro !== b.intro) return a.intro ? 1 : -1;
    return a.c - b.c;
  });
  return result;
}

// Small sparkline component
const Spark = ({ series, target, invert = false }) => {
  const w = 160, h = 28;
  const max = Math.max(...series, target);
  const min = Math.min(...series, target) * 0.95;
  const range = max - min || 1;
  const pts = series.map((v, i) => {
    const x = (i / (series.length - 1)) * (w - 4) + 2;
    const y = h - 2 - ((v - min) / range) * (h - 4);
    return [x, y];
  });
  const path = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
  const targetY = h - 2 - ((target - min) / range) * (h - 4);
  const last = series[series.length - 1];
  const lastY = pts[pts.length - 1][1];
  const ok = invert ? last <= target : last >= target;

  return (
    <svg width={w} height={h} style={{display: "block"}}>
      <line x1={2} y1={targetY} x2={w-2} y2={targetY} stroke="var(--border-strong)" strokeWidth="1" strokeDasharray="2,2"/>
      <path d={path} fill="none" stroke="var(--ink)" strokeWidth="1.5" strokeLinejoin="round"/>
      {pts.map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r={i === pts.length - 1 ? 3 : 1.5} fill={i === pts.length - 1 ? (ok ? "var(--ok)" : "var(--danger)") : "var(--ink)"}/>
      ))}
    </svg>
  );
};

                  labelColor = "white";

                      flex: 1, fontSize: 14.5,
                      lineHeight: 1.7,
                      paddingTop: 4,
                      color: "var(--ink)",

                  </button>

                fontSize: 13.5,

                padding: 12,
                background: "var(--surface-2)",
                borderRadius: 6,

              }}>{problem.comment}</div>

              {problem.tags && problem.tags.length > 0 && (
                <div style={{marginTop: 12, display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center"}}>
                  <span className="label" style={{marginRight: 4}}>関連トピック</span>
                  {problem.tags.map((t, i) => (
                    <span key={i} className="chip">{t}</span>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>

        {/* Side: card meta */}
        <div className="col" style={{flex: 1, minWidth: 240}}>
          <div className="card">
            <div className="card-head">
              <h3>このカード</h3>
              <span className="num muted" style={{fontSize: 11}}>#{c}</span>
            </div>
            <div style={{display: "grid", gap: 10, fontSize: 13}}>

                <span className="muted">通し番号</span>
                <span className="num" style={{fontWeight: 600}}>#{c}</span>

              <div style={{display: "flex", justifyContent: "space-between"}}>

                <span className="num">問{meta.q} ({meta.year})</span>

              <div style={{display: "flex", justifyContent: "space-between"}}>

                <span className="num">Day {introDay(c)}</span>
              </div>
              <div style={{display: "flex", justifyContent: "space-between"}}>
                <span className="muted">今回</span>
                <span>{rep === 0 ? "導入 (新規)" : `${rep}回目の復習`}</span>
              </div>
              <div style={{display: "flex", justifyContent: "space-between"}}>
                <span className="muted">次回出現</span>
                <span className="num">+{Math.pow(2, rep)}日後</span>
              </div>
            </div>
            <div className="divider"/>
            <button className="btn sm" style={{width: "100%"}} onClick={() => goto("cards")}>
              カード進行表で見る →
            </button>
          </div>

          <div className="card">
            <div className="card-head">
              <h3>ミス分類</h3>
              <span className="muted" style={{fontSize: 11}}>誤答時のみ</span>
            </div>
            <div style={{display: "flex", flexDirection: "column", gap: 6}}>
              {[
                ["知識不足型", "そもそも知らなかった", "oklch(0.65 0.16 25)"],
                ["理解不足型", "知識と文脈が結びつかなかった", "oklch(0.7 0.13 75)"],
                ["ケアレス型", "読み落とし・字数オーバー", "oklch(0.55 0.11 200)"],
              ].map(([label, desc, color], i) => (
                <button key={i} className="btn" style={{
                  textAlign: "left",
                  display: "block",
                  padding: "8px 10px",

                  cursor: isWrong ? "pointer" : "not-allowed",
                }} disabled={!isWrong}>
                  <div style={{display: "flex", alignItems: "center", gap: 8}}>
                    <span style={{width: 8, height: 8, borderRadius: "50%", background: color, flexShrink: 0}}/>
                    <span style={{fontWeight: 600, fontSize: 12.5}}>{label}</span>
                  </div>
                  <div className="muted" style={{fontSize: 10.5, marginTop: 2, marginLeft: 16}}>{desc}</div>
                </button>
              ))}
            </div>
          </div>

          <div className="card">
            <div className="card-head">
              <h3>気づきメモ</h3>
            </div>
            <textarea
              placeholder="この問題で得た気づきを記録..."
              style={{
                width: "100%",
                minHeight: 90,
                border: "1px solid var(--border)",
                borderRadius: 6,
                padding: 10,
                fontFamily: "var(--sans)",
                fontSize: 13,
                background: "var(--surface-2)",
                resize: "vertical",
                color: "var(--ink)",
                lineHeight: 1.6,
              }}
            />
            <div className="muted" style={{fontSize: 11, marginTop: 6}}>
              <span className="linkish">+ 弱点メモに昇格</span>
            </div>
          </div>
        </div>
      </div>
    </>
  );
};

  return (
    <div className="app" data-screen-label={`${screen}`}>
      <Sidebar current={screen} setCurrent={setScreen}/>
      <main className="main">
        {screens[screen]}
      </main>

      <window.TweaksPanel title="Tweaks">
        <window.TweakSection label="表示">
          <window.TweakSelect
            label="アクセント色"
            value={t.accent}
            onChange={(v) => setTweak("accent", v)}
            options={[
              { value: "teal", label: "Teal — 標準" },
              { value: "indigo", label: "Indigo" },
              { value: "ember", label: "Ember" },
              { value: "forest", label: "Forest" },
              { value: "sumi", label: "Sumi (墨)" },
            ]}
          />
          <window.TweakRadio
            label="密度"
            value={t.density}
            onChange={(v) => setTweak("density", v)}
            options={[
              { value: "comfortable", label: "標準" },
              { value: "compact", label: "コンパクト" },
            ]}
          />
        </window.TweakSection>

        <window.TweakSection label="画面ジャンプ">
          {[
            ["dashboard", "ダッシュボード"],
            ["today", "今日のセッション"],
            ["problem", "問題画面 (A-2)"],
            ["cards", "A-2カード進行"],
            ["pastexams", "過去問進捗"],
            ["weak", "弱点マップ"],
            ["weekly", "週次レビュー"],
            ["monthly", "月次レビュー"],
          ].map(([k, l]) => (
            <window.TweakButton key={k} label={l + " を開く"} onClick={() => setScreen(k)} secondary={screen !== k}/>
          ))}
        </window.TweakSection>
      </window.TweaksPanel>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

</script>
</body>
</html>
